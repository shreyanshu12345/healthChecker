services:
  backend:
    build: ./backend
    image: shreyanshu/healthchecker-backend:latest
    env_file:
      - ./backend/.env
    expose:
      - "5000"

  frontend:
    build: ./frontend
    image: shreyanshu/healthchecker-frontend:latest
    ports:
      - "80:80"
    depends_on:
      - backend